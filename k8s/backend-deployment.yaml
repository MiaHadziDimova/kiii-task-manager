apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: kiii-task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: miahadjidimova/kiii-task-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: task-config
                  key: DB_USER
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: task-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: task-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: task-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-secret
                  key: DB_PASSWORD